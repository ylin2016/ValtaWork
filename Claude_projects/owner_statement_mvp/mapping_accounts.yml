rules:
  - account_regex: "(?i)repair|maintenance"
    category: "EXPENSE"
    subcategory: "Repairs & Maintenance"
  - account_regex: "(?i)clean"
    category: "EXPENSE"
    subcategory: "Cleaning Labor"
  - account_regex: "(?i)suppl"
    category: "EXPENSE"
    subcategory: "Supplies"
  - account_regex: "(?i)utilit|water|power|electric|gas"
    category: "EXPENSE"
    subcategory: "Utilities"
  - account_regex: "(?i)internet|cable"
    category: "EXPENSE"
    subcategory: "Internet/Cable"
  - account_regex: "(?i)hoa"
    category: "EXPENSE"
    subcategory: "HOA"
  - account_regex: "(?i)insurance"
    category: "EXPENSE"
    subcategory: "Insurance"
  - account_regex: "(?i)tax"
    category: "EXPENSE"
    subcategory: "Property Taxes"
  - account_regex: ".*"
    category: "EXPENSE"
    subcategory: "Other Expense"
